<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{ORGANIZATION_NAME}} Asset Search</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>

    /* ── Reset & tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { height: 100%; background: #0a0a0a; color: #fff; font-family: 'Roboto', Arial, system-ui, sans-serif; font-size: 14px; }

    :root {
      --bg:      {{BG_COLOR}};
      --surface: #141414;
      --border:  #252525;
      --text:    {{FG_COLOR}};
      --muted:   #a0a0a0;
      --dim:     #525252;
      --hover:   #1f1f1f;
      --active:  #2a2a2a;
    }

    /* ── Layout ─────────────────────────────────────── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Status bar ─────────────────────────────────── */
    #status-header {
      display: flex; align-items: center; gap: 0;
      padding: 0 32px; height: 40px;
      border-bottom: 1px solid var(--border);
      background: #000;
      position: sticky; top: 0; z-index: 100;
    }
    #logo { height: 18px; opacity: 0.9; margin-right: 20px }
    #status-bar { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .stat { color: var(--muted); }
    .stat-label { color: var(--dim); }
    .stat-sep { color: var(--dim); }
    .processing-badge {
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 7px; font-size: 11px; color: #d4d4d4;
    }

    /* ── Search section ─────────────────────────────── */
    #search-section {
      padding: 40px 32px 24px;
      max-width: 900px; margin: 0 auto; width: 100%;
    }
    #search-wrap {
      position: relative;
    }
    #search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--dim); font-size: 16px; pointer-events: none;
    }
    #search-input {
      width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 14px 16px 14px 44px;
      color: var(--text); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .15s;
    }
    #search-input:focus { border-color: #444; }
    #search-input:disabled { opacity: 0.5; cursor: not-allowed; }
    #search-input::placeholder { color: var(--dim); }
    #search-hint {
      margin-top: 8px; padding-left: 4px; font-size: 12px; min-height: 18px;
      color: var(--muted); transition: opacity .2s;
    }
    .search-hint.loading { color: #888; }
    .search-hint.error   { color: #ef4444; }
    .search-hint.searching::after { content: ''; animation: ellipsis 1.2s infinite; }
    @keyframes ellipsis { 0%,100%{content:'.'} 33%{content:'..'} 66%{content:'...'} }

    /* ── Grid ───────────────────────────────────────── */
    #grid-section { flex: 1; padding: 0 32px 48px; }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: border-color .15s, transform .15s;
    }
    .card:hover { border-color: #3a3a3a; transform: translateY(-1px); }
    .card-new { animation: fadeIn .4s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }

    .card-preview { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
    .card-video   { width: 100%; height: 100%; object-fit: cover; display: block; }

    .score-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.75); border: 1px solid rgba(255,255,255,.15);
      border-radius: 3px; padding: 2px 7px; font-size: 11px; color: #d4d4d4;
      font-family: monospace;
    }
    .audio-btn {
      position: absolute; bottom: 8px; right: 8px; width: 28px; height: 28px;
      background: rgba(0,0,0,.6); border: none; border-radius: 50%;
      cursor: pointer; font-size: 12px; display: flex; align-items: center;
      justify-content: center; opacity: 0; transition: opacity .15s;
    }
    .card-preview:hover .audio-btn { opacity: 1; }
    .modal-audio-btn { position: absolute; bottom: 8px; right: 8px; opacity: 1; }

    .card-meta { padding: 12px 14px; }
    .card-filename { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-tc     { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: monospace; }
    .card-folder { font-size: 11px; color: var(--dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-tags   { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .tag {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: #1e1e1e; border: 1px solid var(--border); color: var(--muted);
      text-transform: capitalize;
    }

    /* ── Empty state ────────────────────────────────── */
    #empty-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 32px; text-align: center; gap: 12px;
    }
    .empty-title { font-size: 16px; color: var(--muted); font-family: 'Roboto Condensed', sans-serif; text-transform: uppercase; letter-spacing: .08em; }
    .empty-sub   { font-size: 13px; color: var(--dim); max-width: 400px; line-height: 1.6; }

    /* ── Modals ─────────────────────────────────────── */
    #detail-modal, #player-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,.8);
    }

    .modal-panel {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: min(800px, 95vw); max-height: 90vh;
      overflow-y: auto;
    }
    .modal-close {
      position: absolute; top: 12px; right: 12px;
      background: transparent; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; z-index: 2; padding: 4px 8px;
      border-radius: 4px; transition: color .1s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { display: flex; gap: 24px; padding: 24px; flex-wrap: wrap; }
    .modal-preview {
      flex: 0 0 auto; width: min(360px, 100%); aspect-ratio: 16/9;
      background: #000; border-radius: 6px; overflow: hidden; position: relative;
    }
    .modal-preview video { width: 100%; height: 100%; object-fit: cover; }
    .modal-info { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
    .modal-filename { font-family: 'Roboto Condensed', sans-serif; font-size: 16px; text-transform: uppercase; letter-spacing: .06em; }
    .modal-tc { font-family: monospace; color: var(--muted); font-size: 13px; }
    .modal-folder { font-size: 12px; color: var(--dim); }
    .modal-tags-list { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
    .tag-row { display: flex; align-items: center; gap: 8px; }
    .tag-label { font-size: 11px; color: var(--dim); min-width: 100px; }
    .modal-description {
      font-size: 12px; color: var(--muted); line-height: 1.7;
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;
    }
    .modal-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .action-btn {
      padding: 8px 14px; font-size: 12px; font-family: 'Roboto Condensed', sans-serif;
      text-transform: uppercase; letter-spacing: .06em; border-radius: 4px;
      cursor: pointer; transition: background .15s; text-decoration: none;
      background: #1e1e1e; border: 1px solid var(--border); color: var(--text);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .action-btn:hover { background: var(--active); border-color: #444; }
    .action-btn.copied { background: #14532d; border-color: #166534; color: #4ade80; }
    .action-btn.disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Player modal ───────────────────────────────── */
    .player-panel {
      position: relative; z-index: 1;
      background: #000; border: 1px solid var(--border);
      border-radius: 10px; width: min(900px, 95vw);
    }
    .player-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
    }
    .player-title { font-size: 13px; color: var(--muted); font-family: monospace; }
    .player-video-wrap { background: #000; }
    .player-video-wrap video { width: 100%; display: block; max-height: 55vh; object-fit: contain; }

    .player-controls {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    }
    .ctrl-btn {
      background: transparent; border: none; color: var(--text);
      font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0;
    }
    .progress-wrap {
      flex: 1; height: 4px; background: #333; border-radius: 2px;
      position: relative; cursor: pointer;
    }
    .progress-bg  { position: absolute; inset: 0; background: #333; border-radius: 2px; }
    .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: #555; border-radius: 2px; transition: width .1s; }
    .shot-range {
      position: absolute; top: -2px; height: 8px; background: rgba(255,255,255,.4);
      border-radius: 2px; pointer-events: none;
    }
    .progress-handle {
      position: absolute; top: 50%; transform: translate(-50%,-50%);
      width: 12px; height: 12px; background: #fff; border-radius: 50%;
      transition: left .1s;
    }
    .time-display { font-size: 11px; font-family: monospace; color: var(--muted); min-width: 36px; }
    .player-tc-label { font-size: 11px; color: var(--dim); padding: 0 16px 12px; }

    /* ── Display font usage ─────────────────────────── */
    .display { font-family: 'Roboto Condensed', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  
    #app-title {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--app-text);
      opacity: .9;
      margin-right: 20px;
    }

  </style>
</head>
<body>

<div id="app">

  <!-- Status header -->
  <header id="status-header">
    <!-- Replace with <img> pointing to your logo file if you have one -->
    <span id="app-title">{{ORGANIZATION_NAME}}</span>
    <div id="status-bar">
      <span class="stat"><span id="shots-count">…</span> <span class="stat-label">shots</span></span>
      <span class="stat-sep">·</span>
      <span class="stat"><span id="videos-count">…</span> <span class="stat-label">videos</span></span>
    </div>
  </header>

  <!-- Search -->
  <div id="search-section">
    <div id="search-wrap">
      <span id="search-icon">⌕</span>
      <input id="search-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="Loading search engine…"/>
    </div>
    <div id="search-hint"></div>
  </div>

  <!-- Results grid -->
  <div id="grid-section">
    <div id="grid"></div>
    <div id="empty-state">
      <p class="empty-title">No assets yet</p>
      <p class="empty-sub">Process videos through the pipeline to populate the library</p>
    </div>
  </div>

</div>

<!-- Modals — populated by app.ts at runtime -->
<div id="detail-modal"></div>
<div id="player-modal"></div>

<script type="module" src="./src/app.ts"></script>

</body>
</html>
